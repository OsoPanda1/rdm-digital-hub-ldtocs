kind = "api"
title = "RDM Heptafederation API Gateway"
version = "3.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

# El API Gateway del RDM Digital Hub expone las federaciones:
# - Territorial (territory / twins / yun / unified)
# - IA (Isabella core + guardian)
# - Gamificación y música (game engines, cronicas, quests)
# - Monetización (Stripe, Whop, B2B)
# - Telemetría y seguridad (metrics, PQC, audit)
# Este servicio es el punto de entrada único para el frontend RDM Hub y para agentes externos.

previewPath = "/api" # Debe servir un endpoint público mínimo (status o doc base).

[[services]]
name = "RDM API Gateway"
localPort = 8080
paths = ["/api"]

# --- ENTORNO DE DESARROLLO ---

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.development.env]
NODE_ENV = "development"
PORT = "8080"
RDM_FEDERATION_MODE = "heptafederado-dev"
RDM_SECURITY_PROFILE = "dev-relaxed"
RDM_OBSERVABILITY_MODE = "verbose"

# --- ENTORNO DE PRODUCCIÓN ---

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
RDM_FEDERATION_MODE = "heptafederado-prod"
RDM_SECURITY_PROFILE = "prod-hardened"
RDM_OBSERVABILITY_MODE = "balanced"

[services.production.run]
# Arranque directo con node para minimizar overhead y tiempos de startup.
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"
RDM_FEDERATION_MODE = "heptafederado-prod"
RDM_SECURITY_PROFILE = "prod-hardened"
RDM_OBSERVABILITY_MODE = "balanced"
# Secrets de DB, JWT, Stripe, Whop, Supabase, PQC, etc. se gestionan desde Secrets de Replit.
# No deben estar hardcodeados aquí.

# --- HEALTH CHECKS Y FILTROS BÁSICOS ---

[services.production.health]
startup.path = "/api/healthz"
startup.timeoutSeconds = 5
startup.expectedStatus = 200

periodic.path = "/api/healthz"
periodic.intervalSeconds = 30
periodic.expectedStatus = 200

# Convenciones:
# - /api/healthz: endpoint público mínimo, sin auth, sin acceso a DB pesada.
# - /api/public/*: lectura controlada de contenido (ej. algunos datos de territorio).
# - /api/private/*: requiere autenticación (RDMAuthContext, JWT, Supabase Auth).
# - /api/system/*: reservado para internos (telemetría, seguridad, admin); no exponer a clientes normales.
