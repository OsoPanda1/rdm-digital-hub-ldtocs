# Cloudflare Pages / Workers config for RDM Digital LTOS.
# Frontend (Vite SPA) is deployed via Cloudflare Pages; this file pins the
# project name, build output, and compatibility flags. Runtime secrets must
# be configured via `wrangler pages secret put <NAME>` or the Cloudflare
# dashboard — never committed.

name = "rdm-digital-ltos"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# --- Production environment ----------------------------------------------
[env.production]
name = "rdm-digital-ltos"

[env.production.vars]
VITE_APP_ENV = "production"

# Secrets (do NOT put values here):
#   wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY --project-name rdm-digital-ltos
#   wrangler pages secret put GEMINI_API_KEY            --project-name rdm-digital-ltos
#   wrangler pages secret put TURNSTILE_SECRET_KEY      --project-name rdm-digital-ltos
#   wrangler pages secret put SENTRY_DSN                --project-name rdm-digital-ltos

# --- Preview environment -------------------------------------------------
[env.preview]
name = "rdm-digital-ltos-preview"

[env.preview.vars]
VITE_APP_ENV = "preview"
