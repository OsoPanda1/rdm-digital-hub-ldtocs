name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CI: true

jobs:
  quality:
    name: Quality · Lint · Types · Unit · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20] # Compatibilidad multi runtime

    env:
      NODE_VERSION: ${{ matrix.node-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Unit tests (Vitest with coverage)
        run: npx vitest run --coverage --runInBand --reporter=github-actions
        # El reporter github-actions genera job summary y anotaciones.[web:16][web:27]

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage
          if-no-files-found: ignore
          retention-days: 10

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E (sharded)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 40

    # Se puede shardear E2E si la suite crece.[web:22][web:24]
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Setup Playwright (browsers + deps)
        uses: microsoft/playwright-github-action@v1
        with:
          with-deps: true
        # Acción recomendada para instalar browsers y dependencias en GHA.[web:20][web:22]

      - name: Run Playwright tests (shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=list
        # Puedes cambiar reporter a html/junit según tus necesidades.[web:22][web:26]

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 10

  # Job opcional para agregar resumen de cobertura (JSON) o publicar a un dashboard
  coverage_summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      # Ejemplo: generar un summary JSON estructurado con plugin de Vitest.[web:30]
      - name: Vitest coverage summary JSON
        run: |
          npx vitest run --coverage --coverage.reporter=json-summary --runInBand
        env:
          CI: true

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage
          if-no-files-found: ignore
          retention-days: 10

  # Job opcional: smoke E2E sólo en main o cron
  e2e_smoke:
    name: Playwright Smoke (critical paths)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Setup Playwright
        uses: microsoft/playwright-github-action@v1
        with:
          with-deps: true

      # Aquí asumimos que tienes un proyecto/archivo de tests con tag @smoke.[web:26]
      - name: Run Playwright smoke tests
        run: npx playwright test --grep "@smoke"

      - name: Upload Playwright smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 5
