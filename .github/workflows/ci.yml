name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build monorepo (RDM Digital Hub — MD-X4)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspaces
        run: pnpm run build

      # Opcional: separar builds por artefactos principales
      # - name: Build frontend (RDM Hub)
      #   run: pnpm --filter @workspace/rdm-hub run build
      #
      # - name: Build backend (api-server)
      #   run: pnpm --filter @workspace/api-server run build

  coder_task:
    name: Crear tarea Coder (opcional, ligada a issues)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Coder Create Task
        uses: coder/create-task-action@v0.0.5
        with:
          # Prompt/instrucciones para la sesión Coder (puedes ajustar este texto)
          coder-task-prompt: >
            Analiza el estado actual de RDM Digital Hub — LDTOCS (MD-X4),
            revisa el build del monorepo y prepara un workspace para
            depurar issues abiertos y ejecutar pruebas en Replit/Node 20.

          # Token de Coder (debe estar definido en GitHub Secrets)
          coder-token: ${{ secrets.CODER_TOKEN }}

          # URL de despliegue de Coder (por ejemplo, https://coder.tu-dominio.com)
          coder-url: ${{ secrets.CODER_URL }}

          # Nombre de la plantilla de Coder a usar para el workspace
          coder-template-name: ${{ secrets.CODER_TEMPLATE_NAME }}

          # URL del issue de GitHub a vincular (si viene de un PR, se vincula al PR)
          github-issue-url: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}

          # Token de GitHub para operaciones de API
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Identificación del usuario (elige uno de los dos modelos)
          # github-user-id: ${{ github.event.sender.id }}
          coder-username: ${{ secrets.CODER_USERNAME }}

          # Organización de Coder (opcional)
          coder-organization: ${{ secrets.CODER_ORGANIZATION }}

          # Prefijo para el nombre de la tarea
          coder-task-name-prefix: "gh-rdm-mdx4"

          # Preset de plantilla (opcional)
          coder-template-preset: ${{ secrets.CODER_TEMPLATE_PRESET }}

          # Comentar en el issue/PR para dejar rastro de la tarea creada
          comment-on-issue: true
