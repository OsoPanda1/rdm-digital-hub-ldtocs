name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9
  CI: true

jobs:
  #
  # 1) Pre-checks muy rápidos (lint + typecheck) para fallar en < 2–3 min
  #
  fast-checks:
    name: Fast Checks · Lint · Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node (with pnpm)
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  #
  # 2) Seguridad de dependencias y análisis estático básico
  #
  security:
    name: Security · deps audit · CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: fast-checks
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node (with pnpm)
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: npm audit (low latency, fail on high/critical)
        run: |
          pnpm audit --audit-level=high || {
            echo "::error::High or critical vulnerabilities detected";
            exit 1;
          }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  #
  # 3) Test + build multi-runtime en paralelo
  #
  quality:
    name: Quality · Unit · Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: fast-checks
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    env:
      NODE_VERSION: ${{ matrix.node }}
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Unit tests (Vitest)
        run: pnpm test:unit -- --runInBand --reporter=github-actions

      - name: Build monorepo
        run: pnpm build

      - name: Upload dist artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: dist-node20
          path: |
            apps/**/dist
            packages/**/dist
          if-no-files-found: error
          retention-days: 7

  #
  # 4) E2E Playwright paralelo y shardizado
  #
  e2e:
    name: E2E · Playwright · Sharded
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: microsoft/playwright-github-action@v1
        with:
          with-deps: true

      - name: Build web app
        run: pnpm build:web

      - name: Start web app (preview)
        run: pnpm preview:web -- --port=4173 &
      
      - name: Wait for web app
        run: npx wait-on http://127.0.0.1:4173

      - name: Run Playwright E2E (shard ${{ matrix.shard }})
        run: pnpm test:e2e -- --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 5

  #
  # 5) Smoke en main únicamente (baja latencia post-merge)
  #
  smoke-main:
    name: Smoke · Critical Paths (main only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: microsoft/playwright-github-action@v1
        with:
          with-deps: true

      - name: Build web app
        run: pnpm build:web

      - name: Start web app (preview)
        run: pnpm preview:web -- --port=4173 &

      - name: Wait for web app
        run: npx wait-on http://127.0.0.1:4173

      - name: Run Playwright smoke tests
        run: pnpm test:e2e -- --grep "@smoke"

  #
  # 6) Despliegue condicionado (ejemplo: Vercel/Cloudflare) — solo si todo está verde
  #
  deploy:
    name: Deploy · Production
    runs-on: ubuntu-latest
    needs: [quality, e2e, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm build

      # Ejemplo Vercel deploy; ajusta a tu provider real
      - name: Deploy to Vercel
        uses: vercel/actions@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          prod: true

  #
  # 7) Publicar resumen en el Job Summary (opcional, útil para auditorías)
  #
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [fast-checks, quality, security, e2e]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Real del Monte Digital Hub CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Fast checks: ${{ needs.fast-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Quality: ${{ needs.quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E: ${{ needs.e2e.result }}" >> $GITHUB_STEP_SUMMARY
